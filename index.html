<body className="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // ----------------------------------------------------
        // Icons
        // ----------------------------------------------------
        const { 
            Home, Folder, FolderOpen, FileText, FileAudio, FileVideo, 
            Search, ChevronLeft, Menu, X, Calendar, BookOpen, Info,
            PlayCircle, ExternalLink, Clock, ShieldCheck, HeartHandshake,
            Maximize, Headphones, ArrowUp, Accessibility, ZoomIn, ZoomOut,
            Underline, Type, RefreshCw, Quote, User, LogOut, Lock, 
            History, Moon, Sun, ArrowDownAZ, SortDesc, Unlock
        } = lucide;

        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current && window.lucide && window.lucide.icons[name]) {
                    const iElement = document.createElement('i');
                    iElement.setAttribute('data-lucide', name);
                    if (className) iElement.setAttribute('class', className);
                    iElement.setAttribute('width', size);
                    iElement.setAttribute('height', size);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(iElement);
                    window.lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, root: spanRef.current });
                }
            }, [name, size, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
        };

        // ----------------------------------------------------
        // Configuration
        // ----------------------------------------------------
        const CSV_URLS = {
            DRIVE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6OmRPxlNhfecg0vfv-jgnWAgHk9C2NcsLwutzb64KGnisPymHTR02K6LXJBU3fuz15nq9dQTdq3uE/pub?gid=0&single=true&output=csv",
            ARTICLES: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6OmRPxlNhfecg0vfv-jgnWAgHk9C2NcsLwutzb64KGnisPymHTR02K6LXJBU3fuz15nq9dQTdq3uE/pub?gid=1100608744&single=true&output=csv",
            SCHEDULE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6OmRPxlNhfecg0vfv-jgnWAgHk9C2NcsLwutzb64KGnisPymHTR02K6LXJBU3fuz15nq9dQTdq3uE/pub?gid=1693315274&single=true&output=csv"
        };

        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3B0D0XD9h1zkjHlJCKt1znhdE63X-8H8LTjf8vBms6tnrd6w4Vd9V-61BJf_FBhte/exec";
        const FORGOT_PASSWORD_FORM_URL = "https://forms.google.com/";

        // ----------------------------------------------------
        // Data Fetching & Parsing
        // ----------------------------------------------------
        const useCSVData = (url, mapRowFn, cacheKey) => {
            const [data, setData] = React.useState(() => {
                try {
                    const cached = localStorage.getItem(cacheKey);
                    return cached ? JSON.parse(cached) : [];
                } catch(e) { return []; }
            });
            // אם יש נתונים בזיכרון, לא נציג טעינה, ניתן לגולש להתחיל מיד!
            const [loading, setLoading] = React.useState(data.length === 0);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                // הרצה שקטה ברקע שמעדכנת את הנתונים החדשים אם עלו
                Papa.parse(url, {
                    download: true, header: true, skipEmptyLines: true,
                    complete: (results) => {
                        try {
                            const mapped = results.data.map(mapRowFn).filter(Boolean);
                            setData(mapped);
                            localStorage.setItem(cacheKey, JSON.stringify(mapped));
                            setLoading(false);
                        } catch (err) { setError(err.message); setLoading(false); }
                    },
                    error: (err) => { setError(err.message); setLoading(false); }
                });
            }, [url, cacheKey]);

            return { data, loading, error };
        };
        
        const mapDriveRow = (row, index) => {
            const vals = Object.values(row);
            const getVal = (keywords, fallbackIndex) => {
                const foundKey = Object.keys(row).find(k => keywords.some(keyword => k.toLowerCase().includes(keyword)));
                return foundKey ? row[foundKey] : vals[fallbackIndex];
            };

            let rawType = (getVal(['סוג', 'type'], 2) || '').toLowerCase();
            let type = 'pdf';
            if (rawType.includes('video') || rawType.includes('mp4') || rawType.includes('וידאו')) type = 'video';
            if (rawType.includes('audio') || rawType.includes('mp3') || rawType.includes('שמע') || rawType.includes('קול')) type = 'audio';

            return {
                id: index,
                name: getVal(['שם', 'name', 'קובץ'], 0) || 'קובץ ללא שם',
                path: getVal(['נתיב', 'path', 'תיקיה'], 1) || '',
                type: type,
                url: getVal(['קישור', 'url', 'link', 'לינק'], 3) || '#',
                date: getVal(['תאריך', 'date', 'זמן'], 4) || ''
            };
        };

        const mapScheduleRow = (row, index) => {
            const vals = Object.values(row);
            const getVal = (keywords, fallbackIndex) => {
                const foundKey = Object.keys(row).find(k => keywords.some(keyword => k.toLowerCase().includes(keyword)));
                return foundKey ? row[foundKey] : vals[fallbackIndex];
            };
            return {
                id: index,
                title: getVal(['כותרת', 'שם', 'נושא', 'title'], 0) || 'ללא כותרת',
                date: getVal(['תאריך', 'date'], 1) || '',
                time: getVal(['שעה', 'זמן', 'time'], 2) || '',
                description: getVal(['תיאור', 'פירוט', 'desc'], 3) || ''
            };
        };

        const mapArticleRow = (row, index) => {
            const vals = Object.values(row);
            const getVal = (keywords, fallbackIndex) => {
                const foundKey = Object.keys(row).find(k => keywords.some(keyword => k.toLowerCase().includes(keyword)));
                return foundKey ? row[foundKey] : vals[fallbackIndex];
            };
            return {
                id: index,
                title: getVal(['כותרת', 'שם', 'title'], 0) || 'ללא כותרת',
                summary: getVal(['תקציר', 'תיאור', 'summary', 'תוכן'], 1) || '',
                date: getVal(['תאריך', 'date'], 2) || '',
                url: getVal(['קישור', 'url', 'link'], 3) || '#'
            };
        };

        // ----------------------------------------------------
        // Modern UI Components
        // ----------------------------------------------------
        
        // טעינה עם טקסטים מתחלפים
        const DynamicLoader = ({ texts = ["טוען נתונים...", "מסנכרן מידע...", "מכין את התוכן...", "עוד רגע קט..."] }) => {
            const [idx, setIdx] = React.useState(0);
            React.useEffect(() => {
                const interval = setInterval(() => setIdx(i => (i + 1) % texts.length), 2000);
                return () => clearInterval(interval);
            }, [texts.length]);

            return (
                <div className="flex flex-col items-center justify-center h-64 w-full animate-fade-in">
                    <div className="relative w-16 h-16 flex items-center justify-center mb-6">
                        <div className="absolute inset-0 border-4 border-brand-primary/20 rounded-full"></div>
                        <div className="absolute inset-0 border-4 border-brand-secondary rounded-full border-t-transparent animate-spin"></div>
                        <Icon name="Home" size={24} className="text-brand-primary" />
                    </div>
                    <p className="text-gray-600 dark:text-gray-400 font-bold text-lg animate-pulse">{texts[idx]}</p>
                </div>
            );
        };

        const ErrorMsg = ({msg}) => (
            <div className="flex flex-col items-center justify-center h-64 w-full text-red-500 animate-fade-in">
                <Icon name="Info" size={48} className="mb-4 opacity-50" />
                <p className="font-bold text-lg">שגיאה בטעינת הנתונים</p>
                <p className="text-sm opacity-80">{msg}</p>
            </div>
        );

        // מסך פתיחה יוקרתי
        const SplashScreen = () => (
            <div className="fixed inset-0 z-[9999] bg-brand-light dark:bg-gray-900 flex flex-col items-center justify-center animate-splash-out">
                <div className="w-32 h-32 bg-brand-primary/10 dark:bg-brand-primary/20 rounded-full flex items-center justify-center animate-pulse-soft mb-6 shadow-[0_0_40px_rgba(182,132,60,0.3)]">
                    <Icon name="Home" size={64} className="text-brand-primary" />
                </div>
                <h1 className="text-3xl sm:text-4xl font-extrabold text-brand-primary tracking-tight">הבית של הזוגות הצעירים</h1>
                <p className="text-brand-secondary mt-3 font-medium text-lg tracking-wide">מכינים את הבית עבורכם...</p>
            </div>
        );

        const PromoBanner = () => {
            const [visible, setVisible] = React.useState(false);
            const [exiting, setExiting] = React.useState(false);

            React.useEffect(() => {
                setVisible(true);
                const timer1 = setTimeout(() => setExiting(true), 15000);
                const timer2 = setTimeout(() => setVisible(false), 15500);
                return () => { clearTimeout(timer1); clearTimeout(timer2); };
            }, []);

            if (!visible) return null;

            return (
                <div className={`fixed bottom-4 left-4 sm:bottom-8 sm:left-8 z-[999] bg-brand-primary dark:bg-brand-dark text-brand-light p-3 px-4 rounded-xl shadow-2xl flex items-center gap-3 border border-brand-secondary/30 ${exiting ? 'animate-slide-out-left' : 'animate-slide-in-left'}`}>
                    <a href="https://www.matara.pro/nedarimplus/online/?S=JzNp" target="_blank" className="font-bold text-sm hover:text-brand-secondary transition whitespace-nowrap">
                        עדיין לא מנויים? הצטרפו עכשיו!
                    </a>
                    <div className="w-px h-4 bg-brand-light/30 shrink-0"></div>
                    <button onClick={() => { setExiting(true); setTimeout(() => setVisible(false), 500); }} className="hover:text-gray-300 opacity-70 hover:opacity-100 transition shrink-0 p-1">
                        <Icon name="X" size={14} />
                    </button>
                </div>
            );
        };

        const TestimonialsMarquee = () => {
            const feedbacks = [
                { text: "סוף סוף יש מישהו שמדבר על הדברים האלו... ומדבר על הכל פתוח! תודה רבה ושבת שלום!!!", author: "זוג מהמרכז" },
                { text: "בתחילה עשינו הוראת קבע ל-30 שח ואמרנו נראה מה שווה.. אני חייב לציין שעזרת לנו מאוד והתכנים מדויקים לנו!", author: "א. כהן" },
                { text: "תודה על הכל, למרות שאנחנו כמעט ולא מצליחים לעלות לזומים, הידיעה שיש בית מאחורינו תומכת ומחזקת מאוד!", author: "משפחת ל." },
                { text: "רציתי להודות על התוכן המדויק. אנחנו מרגישים שהתוכנית תורמת לנו המון לזוגיות. מעריכים מאוד!!", author: "ד.א." },
                { text: "לא פעם ראשונה שאני קוראת ושומעת רעיונות על זוגיות. פה זה משהו אחר הרמה, הניתוח, האבחנות.. העניין מדהים!", author: "משתתפת בתוכנית" },
                { text: "דבר ראשון חייבת להגיד שאני מתפעמת! המון המון תודה על התוכנית המופלאה הזו.", author: "ר.ב." }
            ];

            return (
                <div className="mt-16 bg-white dark:bg-gray-800 rounded-3xl p-8 border border-brand-secondary/20 shadow-sm overflow-hidden relative">
                    <div className="text-center mb-8">
                        <h3 className="text-2xl font-extrabold text-brand-primary dark:text-brand-secondary flex items-center justify-center gap-3">
                            <Icon name="HeartHandshake" className="text-brand-secondary" size={32} /> מה אומרים הזוגות בבית?
                        </h3>
                    </div>
                    <div className="marquee-wrapper">
                        <div className="marquee-content">
                            {feedbacks.map((item, i) => (
                                <div key={i} className="bg-brand-light dark:bg-gray-700 p-6 rounded-2xl border-t-4 border-brand-secondary shadow-sm relative w-80 flex-shrink-0 flex flex-col">
                                    <Icon name="Quote" className="text-brand-primary/10 dark:text-gray-600 absolute top-4 right-4" size={32} />
                                    <p className="text-gray-700 dark:text-gray-300 text-sm italic relative z-10 mb-6 font-medium leading-relaxed mt-4">"{item.text}"</p>
                                    <span className="text-xs font-extrabold text-brand-primary dark:text-brand-secondary block mt-auto">- {item.author}</span>
                                </div>
                            ))}
                        </div>
                        <div className="marquee-content" aria-hidden="true">
                            {feedbacks.map((item, i) => (
                                <div key={`dup-${i}`} className="bg-brand-light dark:bg-gray-700 p-6 rounded-2xl border-t-4 border-brand-secondary shadow-sm relative w-80 flex-shrink-0 flex flex-col">
                                    <Icon name="Quote" className="text-brand-primary/10 dark:text-gray-600 absolute top-4 right-4" size={32} />
                                    <p className="text-gray-700 dark:text-gray-300 text-sm italic relative z-10 mb-6 font-medium leading-relaxed mt-4">"{item.text}"</p>
                                    <span className="text-xs font-extrabold text-brand-primary dark:text-brand-secondary block mt-auto">- {item.author}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ----------------------------------------------------
        // App Pages
        // ----------------------------------------------------

        const HomePage = ({ setPage }) => (
            <div className="animate-fade-in space-y-12 relative">
                <div className="bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-brand-secondary/20 overflow-hidden relative">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-brand-primary/10 dark:bg-brand-primary/5 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                    <div className="absolute bottom-0 left-0 w-48 h-48 bg-brand-secondary/10 dark:bg-brand-secondary/5 rounded-full -ml-24 -mb-24 blur-3xl"></div>
                    
                    <div className="p-8 md:p-16 text-center relative z-10">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-brand-primary dark:text-brand-secondary mb-6 animate-fade-up" style={{ animationDelay: '0.1s' }}>
                            מוזמנים להיכנס אל<br/>
                            <span className="text-brand-secondary dark:text-white mt-2 inline-block">הבית של הזוגות הצעירים</span>
                        </h1>
                        <p className="text-xl text-gray-700 dark:text-gray-300 mb-8 max-w-2xl mx-auto font-medium animate-fade-up" style={{ animationDelay: '0.3s' }}>
                            כל הידע שזוג צריך, ללא הגבלה, רק אתם בוחרים.
                        </p>
                        <button 
                            onClick={() => setPage('explorer')}
                            className="bg-brand-primary hover:bg-brand-dark text-white px-8 py-4 rounded-full font-bold text-lg transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex items-center justify-center mx-auto gap-2 animate-fade-up"
                            style={{ animationDelay: '0.5s' }}
                        >
                            <Icon name="FolderOpen" size={24} />
                            כניסה לסייר השיעורים
                        </button>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-4">
                    <div className="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 text-center hover:border-brand-secondary dark:hover:border-brand-secondary transition-colors animate-fade-up" style={{ animationDelay: '0.7s' }}>
                        <div className="bg-brand-secondary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-secondary">
                            <Icon name="HeartHandshake" size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-brand-primary dark:text-white mb-2">מרגישים יותר נורמליים</h3>
                        <p className="text-gray-600 dark:text-gray-400">מגוון קורסים, שידורים חיים ותכנים פרקטיים לחוויה זוגית קלאסית ורגועה.</p>
                    </div>
                    
                    <div className="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 text-center hover:border-brand-secondary transition-colors animate-fade-up" style={{ animationDelay: '0.9s' }}>
                        <div className="bg-brand-secondary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-secondary">
                            <Icon name="ShieldCheck" size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-brand-primary dark:text-white mb-2">יש כתובת כשקשה</h3>
                        <p className="text-gray-600 dark:text-gray-400">מערך מענים דיסקרטיים בסודיות מוחלטת לשאלות אישיות ולחיזוק הקשר.</p>
                    </div>

                    <div className="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 text-center hover:border-brand-secondary transition-colors animate-fade-up" style={{ animationDelay: '1.1s' }}>
                        <div className="bg-brand-secondary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-secondary">
                            <Icon name="PlayCircle" size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-brand-primary dark:text-white mb-2">אתם לא לבד</h3>
                        <p className="text-gray-600 dark:text-gray-400">כל המידע שאין להשיג בשום מקום: לצפייה, להאזנה ולקריאה מהירה, הכל בסייר שלנו.</p>
                    </div>
                </div>

                <TestimonialsMarquee />
            </div>
        );

        const ExplorerPage = ({ onFileInteract }) => {
            const [currentPath, setCurrentPath] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [sortByNewest, setSortByNewest] = React.useState(false);
            
            const { data, loading, error } = useCSVData(CSV_URLS.DRIVE, mapDriveRow, 'habait_csv_drive');

            const getDirectoryContents = () => {
                let filesAndFolders = [];

                if (searchQuery.trim() !== "") {
                    filesAndFolders = data
                        .filter(item => item.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                        item.path.toLowerCase().includes(searchQuery.toLowerCase()))
                        .map(item => ({ ...item, isFolder: false }));
                } else {
                    const folders = new Set();
                    const files = [];

                    data.forEach(item => {
                        if (currentPath === "" || item.path === currentPath || item.path.startsWith(currentPath + "/")) {
                            let relativePath = "";
                            if (currentPath === "") {
                                relativePath = item.path;
                            } else {
                                if (item.path === currentPath) {
                                    relativePath = "";
                                } else {
                                    relativePath = item.path.substring(currentPath.length + 1);
                                }
                            }

                            if (relativePath === "") {
                                files.push({ ...item, isFolder: false });
                            } else {
                                const nextFolderName = relativePath.split('/')[0];
                                if (nextFolderName) folders.add(nextFolderName);
                            }
                        }
                    });

                        <h4 className="text-3xl font-bold text-brand-primary dark:text-brand-secondary font-serif" style={{fontFamily: 'cursive'}}>אביאל נריה</h4>
                    </div>
                </div>

            </div>
        );

        const HistoryPage = ({ user, localHistory, onFileInteract }) => {
            const [historyItems, setHistoryItems] = React.useState(localHistory || []);
            const [isSyncing, setIsSyncing] = React.useState(false);

            React.useEffect(() => {
                if (!user || !APP_SCRIPT_URL || APP_SCRIPT_URL.includes("הכנס_כאן")) return;
                setIsSyncing(true);
                fetch(`${APP_SCRIPT_URL}?action=get_history&email=${encodeURIComponent(user.email)}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success' && data.data) {
                            const combined = [...localHistory, ...data.data];
                            const unique = Array.from(new Set(combined.map(a => a.name)))
                                .map(name => combined.find(a => a.name === name));
                            setHistoryItems(unique);
                        }
                    })
                    .catch(e => console.log("שגיאה בסנכרון:", e))
                    .finally(() => setIsSyncing(false));
            }, [user]); 

            if (!user) return null;

            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-fade-in relative">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-brand-primary dark:text-white mb-2 flex justify-center items-center gap-2">
                            היסטוריית הצפייה שלי
                            {isSyncing && <Icon name="RefreshCw" size={20} className="animate-spin text-gray-400" title="מסנכרן בענן..." />}
                        </h2>
                        <p className="text-gray-600 dark:text-gray-400">כל התכנים שפתחת נשמרים כאן לגישה מהירה.</p>
                    </div>

                    {historyItems.length === 0 ? (
                        <div className="text-center py-16 text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm">
                            <Icon name="History" size={48} className="mx-auto mb-3 opacity-50" />
                            עדיין לא צפית בשיעורים.
                        </div>
                    ) : (
                        <div className="grid gap-4">
                            {historyItems.map((item, idx) => (
                                <div key={idx} onClick={() => onFileInteract(item)} className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col md:flex-row md:items-center justify-between hover:border-brand-secondary dark:hover:border-brand-secondary transition cursor-pointer group">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-brand-primary/10 dark:bg-brand-primary/20 rounded-full flex items-center justify-center group-hover:scale-105 transition-transform">
                                            <Icon name={item.type === 'audio' ? 'Headphones' : item.type === 'video' ? 'FileVideo' : 'FileText'} size={24} className="text-brand-primary dark:text-brand-secondary" />
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-gray-800 dark:text-gray-200 text-lg leading-tight">{item.name}</h4>
                                            <p className="text-xs text-gray-500 dark:text-gray-400 mt-1 flex items-center gap-1">
                                                <Icon name="Clock" size={12} /> נצפה לאחרונה: {item.lastWatched || "היום"}
                                            </p>
                                        </div>
                                    </div>
                                    <button className="mt-4 md:mt-0 bg-brand-light dark:bg-gray-700 text-brand-primary dark:text-white font-bold py-2.5 px-6 rounded-xl text-sm transition flex items-center gap-2 group-hover:bg-brand-primary group-hover:text-white">
                                        המשך צפייה <Icon name="PlayCircle" size={16} />
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ----------------------------------------------------
        // Global Modal for viewing files
        // ----------------------------------------------------
        const GlobalFileViewer = ({ file, onClose }) => {
            if (!file) return null;
            
            const getFileIcon = (type) => {
                switch(type) {
                    case 'video': return <Icon name="FileVideo" className="text-white" size={32} />;
                    case 'audio': return <Icon name="FileAudio" className="text-white" size={32} />;
                    default: return <Icon name="FileText" className="text-white" size={32} />;
                }
            };

            const getEmbedUrl = (url) => {
                const driveIdMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (driveIdMatch && driveIdMatch[1]) return `https://drive.google.com/file/d/${driveIdMatch[1]}/preview`;
                return url; 
            };

            return (
                <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 md:p-8 animate-fade-in">
                    <div className="bg-white dark:bg-gray-900 w-full max-w-5xl h-full md:h-[90vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl border border-brand-primary/50">
                        <div className="bg-brand-primary text-white p-4 flex justify-between items-center shadow-md z-10">
                            <div className="flex items-center gap-3">
                                {getFileIcon(file.type)}
                                <h3 className="font-bold text-lg leading-tight truncate max-w-sm sm:max-w-md" dir="rtl">{file.name}</h3>
                            </div>
                            <div className="flex items-center gap-3">
                                <a href={file.url || file.link} target="_blank" rel="noopener noreferrer" className="bg-brand-secondary hover:bg-yellow-600 text-white px-3 sm:px-4 py-2 rounded-full text-sm font-bold transition-colors flex items-center gap-2">
                                    <Icon name="ExternalLink" size={16} /> <span className="hidden sm:inline">פתיחה בדרייב</span>
                                </a>
                                <button onClick={onClose} className="p-2 hover:bg-white/20 rounded-full transition-colors" title="סגירה">
                                    <Icon name="X" size={24} />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 bg-gray-100 dark:bg-gray-800 relative w-full h-full">
                            <iframe src={getEmbedUrl(file.url || file.link)} className="w-full h-full border-none absolute inset-0" allow="autoplay" title={file.name}></iframe>
                        </div>
                    </div>
                </div>
            );
        };


        // ----------------------------------------------------
        // Main App Component
        // ----------------------------------------------------
        const App = () => {
            const [showSplash, setShowSplash] = React.useState(true);
            const [isDarkMode, setIsDarkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');
            
            const [user, setUser] = React.useState(() => {
                const savedUser = localStorage.getItem('habait_user');
                return savedUser ? JSON.parse(savedUser) : null;
            });
            const [localHistory, setLocalHistory] = React.useState(() => {
                const hist = localStorage.getItem('habait_history');
                return hist ? JSON.parse(hist) : [];
            });
            
            const [currentPage, setCurrentPage] = React.useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [showBackToTop, setShowBackToTop] = React.useState(false);
            const [showA11y, setShowA11y] = React.useState(false);
            const [globalFile, setGlobalFile] = React.useState(null);

            // Auth Modal State
            const [showAuthModal, setShowAuthModal] = React.useState(false);
            const [authMode, setAuthMode] = React.useState('login');
            const [authEmail, setAuthEmail] = React.useState('');
            const [authPassword, setAuthPassword] = React.useState('');
            const [authName, setAuthName] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);
            const [authLoadingTextIdx, setAuthLoadingTextIdx] = React.useState(0);

            const authTexts = ["מתחבר לשרת...", "מוודא נתונים...", "מצפין מידע...", "עוד רגע קט..."];

            React.useEffect(() => {
                setTimeout(() => setShowSplash(false), 2500);
            }, []);

            React.useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
                localStorage.setItem('darkMode', isDarkMode);
            }, [isDarkMode]);

            React.useEffect(() => {
                if (authLoading) {
                    const int = setInterval(() => setAuthLoadingTextIdx(i => (i + 1) % authTexts.length), 2000);
                    return () => clearInterval(int);
                }
            }, [authLoading]);

            const pingGoogleSheets = (dataObj, callback) => {
                if (!APP_SCRIPT_URL || APP_SCRIPT_URL.includes("הכנס_כאן")) {
                    if (callback) callback({status: "error", message: "כתובת השרת לא הוגדרה בקוד."});
                    return;
                }
                fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(dataObj) 
                })
                .then(res => res.json())
                .then(data => { if(callback) callback(data); })
                .catch(e => { console.log("שגיאת תקשורת", e); if(callback) callback({status: "error", message: "שגיאת תקשורת עם השרת."}); });
            };

            const handleAuthSubmit = (e) => {
                e.preventDefault();
                setAuthError(''); setAuthLoading(true); setAuthLoadingTextIdx(0);

                pingGoogleSheets({ action: authMode, name: authName, email: authEmail, password: authPassword }, (response) => {
                    setAuthLoading(false);
                    if (response.status === 'success') {
                        const loggedUser = { name: response.name || authName, email: authEmail };
                        localStorage.setItem('habait_user', JSON.stringify(loggedUser));
                        setUser(loggedUser);
                        setShowAuthModal(false);
                        pingGoogleSheets({ action: 'log_visit', name: loggedUser.name, email: loggedUser.email, actionType: authMode === 'register' ? 'הרשמה חדשה' : 'התחברות' });
                    } else {
                        setAuthError(response.message || "אירעה שגיאה, נסו שנית.");
                    }
                });
            };

            const handleLogout = () => {
                localStorage.removeItem('habait_user'); localStorage.removeItem('habait_history');
                setUser(null); setLocalHistory([]);
                if (currentPage === 'history') navigate('home');
            };

            const saveToHistoryAndOpen = (item) => {
                setGlobalFile(item); 
                
                if (!user) return;
                const d = new Date();
                const dateStr = `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                
                const newItem = { name: item.name, type: item.type, url: item.url || item.link || '', lecturer: item.lecturer || '', lastWatched: dateStr };
                const newHistory = [newItem, ...localHistory.filter(h => h.name !== item.name)].slice(0, 50); 
                setLocalHistory(newHistory);
                localStorage.setItem('habait_history', JSON.stringify(newHistory));

                pingGoogleSheets({ action: 'save_history', email: user.email, itemName: item.name, itemType: item.type, itemLink: item.url || item.link || '', itemLecturer: item.lecturer || '' });
            };

            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'home';
                    if (['home', 'explorer', 'schedule', 'articles', 'about', 'history'].includes(hash)) setCurrentPage(hash);
                };
                handleHashChange(); 
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            React.useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);
            React.useEffect(() => {
                const handleScroll = () => setShowBackToTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigate = (pageId) => {
                if (pageId === 'history' && !user) { setShowAuthModal(true); return; }
                window.location.hash = pageId;
                setIsMobileMenuOpen(false);
            };

            const toggleA11yMenu = () => setShowA11y(!showA11y);
            const changeFontSize = (step) => document.body.style.fontSize = `${parseFloat(getComputedStyle(document.body).fontSize) + step}px`;
            const toggleReadableFont = () => document.body.classList.toggle('a11y-readable-font');
            const toggleHighlightLinks = () => document.body.classList.toggle('a11y-highlight-links');
            const resetA11y = () => { document.body.style.fontSize = ''; document.body.classList.remove('a11y-readable-font', 'a11y-highlight-links'); setShowA11y(false); };

            const navItems = [
                { id: 'home', label: 'ראשי', icon: 'Home' },
                { id: 'explorer', label: 'סייר שיעורים', icon: 'FolderOpen' },
                { id: 'schedule', label: 'לוח זמנים', icon: 'Calendar' },
                { id: 'articles', label: 'מאמרים', icon: 'BookOpen' },
                { id: 'history', label: 'היסטוריית צפייה', icon: 'History' },
                { id: 'about', label: 'אודות', icon: 'Info' }
            ];

            const renderPage = () => {
                switch(currentPage) {
                    case 'home': return <HomePage setPage={navigate} />;
                    case 'explorer': return <ExplorerPage onFileInteract={(i) => saveToHistoryAndOpen(i)} />;
                    case 'schedule': return <SchedulePage />;
                    case 'articles': return <ArticlesPage />;
                    case 'about': return <AboutPage />;
                    case 'history': return <HistoryPage user={user} localHistory={localHistory} onFileInteract={(i) => saveToHistoryAndOpen(i)} />;
                    default: return <HomePage setPage={navigate} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative pb-20 sm:pb-0">
                    {showSplash && <SplashScreen />}
                    <GlobalFileViewer file={globalFile} onClose={() => setGlobalFile(null)} />
                    
                    {/* Header */}
                    <header className="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-50 transition-colors">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('home')}>

                                            <button key={item.id} onClick={() => navigate(item.id)}
                                                className={`px-3 py-2 rounded-full flex items-center gap-1.5 font-medium transition-all text-sm whitespace-nowrap
                                                    ${currentPage === item.id 
                                                        ? 'bg-brand-primary/10 text-brand-primary dark:bg-brand-secondary/20 dark:text-brand-secondary' 
                                                        : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-brand-primary dark:hover:text-white'
                                                    }`}>
                                                <Icon name={item.icon} size={16} /> {item.label}
                                            </button>
                                        ))}
                                    </nav>

                                    <div className="w-px h-6 bg-gray-200 dark:bg-gray-700 hidden lg:block mx-2"></div>

                                    {/* Auth */}
                                    <div className="flex items-center gap-2 bg-gray-50 dark:bg-gray-800 px-3 py-1.5 rounded-full border border-gray-100 dark:border-gray-700">
                                        {!user ? (
                                            <button onClick={() => { setAuthMode('login'); setShowAuthModal(true); setAuthError(''); }} className="text-sm font-bold text-brand-primary dark:text-brand-secondary hover:text-brand-secondary dark:hover:text-white transition flex items-center gap-1">
                                                <Icon name="User" size={16} /> התחברות
                                            </button>
                                        ) : (
                                            <div className="flex items-center gap-2 sm:gap-3">
                                                <span className="text-sm font-bold text-gray-700 dark:text-gray-200 hidden sm:block truncate max-w-[100px]">{user.name}</span>
                                                <button onClick={handleLogout} className="text-gray-400 hover:text-red-500 transition p-1" title="התנתק">
                                                    <Icon name="LogOut" size={16} />
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    {/* Dark Mode & A11y */}
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-gray-500 dark:text-gray-400 hover:text-brand-primary dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition" title="מצב לילה/יום">
                                            <Icon name={isDarkMode ? "Sun" : "Moon"} size={20} />
                                        </button>
                                        <button onClick={toggleA11yMenu} className="p-2 text-gray-500 dark:text-gray-400 hover:text-brand-primary dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition" title="הגדרות נגישות">
                                            <Icon name="Accessibility" size={20} />
                                        </button>
                                    </div>

                                    <div className="lg:hidden ml-1">
                                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-brand-primary dark:text-white p-2">
                                            <Icon name={isMobileMenuOpen ? "X" : "Menu"} size={26} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        {isMobileMenuOpen && (
                            <div className="lg:hidden border-t border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 absolute w-full shadow-lg pb-4">
                                <div className="px-4 pt-2 pb-4 space-y-1">
                                    {navItems.map(item => (
                                        <button key={item.id} onClick={() => navigate(item.id)}
                                            className={`w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-medium transition-all
                                                ${currentPage === item.id 
                                                    ? 'bg-brand-primary/10 text-brand-primary dark:bg-brand-secondary/20 dark:text-brand-secondary' 
                                                    : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'
                                                }`}>
                                            <Icon name={item.icon} size={20} /> {item.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </header>

                    {/* Auth Modal */}
                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-sm w-full text-center relative shadow-2xl border border-gray-200 dark:border-gray-700">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 left-4 text-gray-400 hover:text-gray-800 dark:hover:text-white bg-gray-100 dark:bg-gray-700 p-2 rounded-full transition">
                                    <Icon name="X" size={20} />
                                </button>
                                <div className="w-16 h-16 bg-brand-primary/10 dark:bg-brand-primary/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name={authMode === 'forgot_password' ? 'Mail' : 'User'} size={32} className="text-brand-primary dark:text-brand-secondary" />
                                </div>
                                <h3 className="text-2xl font-bold text-gray-800 dark:text-white mb-2">
                                    {authMode === 'login' ? 'ברוכים הבאים' : 'הרשמה לאתר'}
                                </h3>
                                <p className="text-gray-500 dark:text-gray-400 mb-6 text-sm">
                                    {authMode === 'forgot_password' ? 'מלאו את הטופס ונשלח לכם את הסיסמה.' : 'הזדהו פעם אחת כדי לשמור היסטוריה.'}
                                </p>
                                
                                {authMode === 'forgot_password' ? (
                                    <div className="py-2 animate-fade-in">
                                        <a href={FORGOT_PASSWORD_FORM_URL} target="_blank" rel="noopener noreferrer" className="w-full bg-brand-primary hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition shadow flex justify-center items-center gap-2">
                                            <Icon name="ExternalLink" size={20} /> מעבר לטופס שחזור סיסמה
                                        </a>
                                    </div>
                                ) : (
                                    <form onSubmit={handleAuthSubmit} className="space-y-4 text-right animate-fade-in">
                                        {authMode === 'register' && (
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">שם מלא</label>
                                                <input type="text" required value={authName} onChange={e => setAuthName(e.target.value)} placeholder="לדוגמה: משה כהן" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-2 focus:border-brand-primary outline-none transition" />
                                            </div>
                                        )}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">כתובת מייל אישית</label>
                                            <input type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="name@example.com" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-2 focus:border-brand-primary outline-none transition text-left" dir="ltr" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">סיסמה (לפחות 6 תווים)</label>
                                            <input type="password" required value={authPassword} onChange={e => setAuthPassword(e.target.value)} className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded-xl px-4 py-2 focus:border-brand-primary outline-none transition text-left" dir="ltr" />
                                        </div>
                                        
                                        {authError && <div className="text-red-600 bg-red-50 dark:bg-red-900/30 p-2 rounded-lg text-sm text-center font-bold animate-fade-in">{authError}</div>}

                                        <button type="submit" disabled={authLoading} className="w-full bg-brand-primary hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition shadow mt-2 disabled:opacity-80 flex justify-center items-center gap-2">
                                            {authLoading ? (
                                                <React.Fragment>
                                                    <Icon name="RefreshCw" className="animate-spin" size={20} />
                                                    <span className="animate-pulse">{authTexts[authLoadingTextIdx]}</span>
                                                </React.Fragment>
                                            ) : (authMode === 'login' ? 'היכנס למערכת' : 'צור חשבון')}
                                        </button>
                                    </form>
                                )}

                                <div className="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 flex flex-col gap-2 text-sm">
                                    {authMode === 'login' ? (
                                        <React.Fragment>
                                            <button onClick={() => { setAuthMode('register'); setAuthError(''); }} className="text-brand-secondary hover:text-brand-primary dark:hover:text-white font-bold transition-colors">אין לך חשבון? לחץ כאן להרשמה</button>
                                            <button onClick={() => { setAuthMode('forgot_password'); setAuthError(''); }} className="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors">שכחת סיסמה? לחץ כאן</button>
                                        </React.Fragment>
                                    ) : (
                                        <button onClick={() => { setAuthMode('login'); setAuthError(''); }} className="text-brand-secondary hover:text-brand-primary dark:hover:text-white font-bold transition-colors">חזור למסך ההתחברות</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* A11y Floating Menu */}
                    {showA11y && (
                        <div className="fixed top-24 left-4 sm:left-8 z-[100] flex flex-col items-start animate-fade-in">
                            <div className="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-2xl border-2 border-brand-secondary mb-3 w-64 text-right">
                                <div className="flex justify-between items-center mb-4 border-b border-gray-200 dark:border-gray-700 pb-3">
                                    <button onClick={toggleA11yMenu} className="text-gray-400 hover:text-red-500 transition">
                                        <Icon name="X" size={20} />
                                    </button>
                                    <h3 className="font-bold text-brand-primary dark:text-white flex items-center gap-2">
                                        נגישות <Icon name="Accessibility" size={20} className="text-brand-secondary" />
                                    </h3>
                                </div>
                                <div className="space-y-2.5">
                                    <button onClick={() => changeFontSize(2)} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        הגדל טקסט <Icon name="ZoomIn" size={16} />
                                    </button>
                                    <button onClick={() => changeFontSize(-2)} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        הקטן טקסט <Icon name="ZoomOut" size={16} />
                                    </button>
                                    <button onClick={toggleHighlightLinks} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        הדגשת קישורים <Icon name="Underline" size={16} />
                                    </button>
                                    <button onClick={toggleReadableFont} className="w-full bg-gray-50 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        גופן קריא <Icon name="Type" size={16} />
                                    </button>
                                    <div className="w-full h-px bg-gray-200 dark:bg-gray-700 my-2"></div>
                                    <button onClick={resetA11y} className="w-full bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/50 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        איפוס הגדרות <Icon name="RefreshCw" size={16} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 md:py-12 relative z-10">
                        {renderPage()}
                    </main>

                    {/* Back to Top Button */}
                    <button 
                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} 
                        className={`fixed bottom-20 sm:bottom-8 right-6 sm:left-6 sm:right-auto bg-brand-primary text-white p-3 rounded-full shadow-xl transition-all duration-300 z-40 hover:scale-110 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                    >
                        <Icon name="ArrowUp" size={24} />
                    </button>

                    {/* Footer */}
                    <footer className="bg-brand-dark dark:bg-gray-900 text-white py-8 border-t-4 border-brand-secondary relative z-10 transition-colors">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p className="text-brand-light/80 mb-1">© {new Date().getFullYear()} הבית של הזוגות הצעירים - אביאל נריה. כל הזכויות שמורות.</p>
                            <p className="mt-3 text-sm text-brand-light/60 bg-black/20 inline-block px-4 py-1.5 rounded-full">
                                נבנה על ידי <a href="https://xsx-x.github.io/Good-heart/" target="_blank" rel="noopener noreferrer" className="text-brand-secondary hover:text-white font-bold transition">לב טוב</a>
                            </p>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
