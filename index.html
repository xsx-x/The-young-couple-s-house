<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הבית של הזוגות הצעירים - סייר תכנים</title>
    
    <!-- תמונה לכרטיסיה בדפדפן (Favicon) -->
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#842a47', // צבע הבורדו/שזיף מהלוגו
                            secondary: '#b6843c', // צבע הזהב/חרדל מהלוגו
                            light: '#fdfbf7', // רקע בהיר ונעים
                            dark: '#4a1526' // בורדו כהה לטקסט
                        }
                    },
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PapaParse for CSV processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            background-color: #fdfbf7;
            color: #333;
            transition: font-size 0.3s ease;
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #b6843c; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #842a47; }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }

        /* Marquee Animation */
        .marquee-wrapper {
            display: flex;
            overflow: hidden;
            user-select: none;
            gap: 1.5rem;
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        .marquee-content {
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            gap: 1.5rem;
            min-width: 100%;
            animation: scroll-rtl 40s linear infinite;
        }
        .marquee-wrapper:hover .marquee-content { animation-play-state: paused; }
        @keyframes scroll-rtl {
            from { transform: translateX(0); }
            to { transform: translateX(100%); } /* מותאם ל-RTL */
        }

        /* Accessibility Classes */
        .a11y-readable-font * { font-family: Arial, Helvetica, sans-serif !important; letter-spacing: 0.5px !important; }
        .a11y-highlight-links a, .a11y-highlight-links button { text-decoration: underline !important; font-weight: 800 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ----------------------------------------------------
        // Icons setup (using Lucide React icons)
        // ----------------------------------------------------
        const { 
            Home, Folder, FolderOpen, FileText, FileAudio, FileVideo, 
            Search, ChevronLeft, Menu, X, Calendar, BookOpen, Info,
            PlayCircle, ExternalLink, Clock, ShieldCheck, HeartHandshake,
            Maximize, Headphones, ArrowUp, Accessibility, ZoomIn, ZoomOut,
            Underline, Type, RefreshCw, Quote, Volume2
        } = lucide;

        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current && window.lucide && window.lucide.icons[name]) {
                    const iElement = document.createElement('i');
                    iElement.setAttribute('data-lucide', name);
                    if (className) iElement.setAttribute('class', className);
                    iElement.setAttribute('width', size);
                    iElement.setAttribute('height', size);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(iElement);
                    window.lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, root: spanRef.current });
                }
            }, [name, size, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
        };

        // ----------------------------------------------------
        // Google Sheets Data Logic
        // ----------------------------------------------------
        const CSV_URLS = {
            DRIVE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6OmRPxlNhfecg0vfv-jgnWAgHk9C2NcsLwutzb64KGnisPymHTR02K6LXJBU3fuz15nq9dQTdq3uE/pub?gid=0&single=true&output=csv",
            ARTICLES: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6OmRPxlNhfecg0vfv-jgnWAgHk9C2NcsLwutzb64KGnisPymHTR02K6LXJBU3fuz15nq9dQTdq3uE/pub?gid=1100608744&single=true&output=csv",
            SCHEDULE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6OmRPxlNhfecg0vfv-jgnWAgHk9C2NcsLwutzb64KGnisPymHTR02K6LXJBU3fuz15nq9dQTdq3uE/pub?gid=1693315274&single=true&output=csv"
        };

        const useCSVData = (url, mapRowFn) => {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                setLoading(true);
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        try {
                            const mapped = results.data.map(mapRowFn).filter(Boolean);
                            setData(mapped);
                            setLoading(false);
                        } catch (err) { setError(err.message); setLoading(false); }
                    },
                    error: (err) => { setError(err.message); setLoading(false); }
                });
            }, [url]);

            return { data, loading, error };
        };
        
        const mapDriveRow = (row, index) => {
            const vals = Object.values(row);
            const getVal = (keywords, fallbackIndex) => {
                const foundKey = Object.keys(row).find(k => keywords.some(keyword => k.toLowerCase().includes(keyword)));
                return foundKey ? row[foundKey] : vals[fallbackIndex];
            };

            let rawType = (getVal(['סוג', 'type'], 2) || '').toLowerCase();
            let type = 'pdf';
            if (rawType.includes('video') || rawType.includes('mp4') || rawType.includes('וידאו')) type = 'video';
            if (rawType.includes('audio') || rawType.includes('mp3') || rawType.includes('שמע') || rawType.includes('קול')) type = 'audio';

            return {
                id: index,
                name: getVal(['שם', 'name', 'קובץ'], 0) || 'קובץ ללא שם',
                path: getVal(['נתיב', 'path', 'תיקיה'], 1) || '',
                type: type,
                url: getVal(['קישור', 'url', 'link', 'לינק'], 3) || '#',
                date: getVal(['תאריך', 'date', 'זמן'], 4) || ''
            };
        };

        const mapScheduleRow = (row, index) => {
            const vals = Object.values(row);
            const getVal = (keywords, fallbackIndex) => {
                const foundKey = Object.keys(row).find(k => keywords.some(keyword => k.toLowerCase().includes(keyword)));
                return foundKey ? row[foundKey] : vals[fallbackIndex];
            };
            return {
                id: index,
                title: getVal(['כותרת', 'שם', 'נושא', 'title'], 0) || 'ללא כותרת',
                date: getVal(['תאריך', 'date'], 1) || '',
                time: getVal(['שעה', 'זמן', 'time'], 2) || '',
                description: getVal(['תיאור', 'פירוט', 'desc'], 3) || ''
            };
        };

        const mapArticleRow = (row, index) => {
            const vals = Object.values(row);
            const getVal = (keywords, fallbackIndex) => {
                const foundKey = Object.keys(row).find(k => keywords.some(keyword => k.toLowerCase().includes(keyword)));
                return foundKey ? row[foundKey] : vals[fallbackIndex];
            };
            return {
                id: index,
                title: getVal(['כותרת', 'שם', 'title'], 0) || 'ללא כותרת',
                summary: getVal(['תקציר', 'תיאור', 'summary', 'תוכן'], 1) || '',
                date: getVal(['תאריך', 'date'], 2) || '',
                url: getVal(['קישור', 'url', 'link'], 3) || '#'
            };
        };

        // ----------------------------------------------------
        // Components
        // ----------------------------------------------------

        const Loader = () => (
            <div className="flex flex-col items-center justify-center h-64 w-full">
                <div className="animate-spin rounded-full h-12 w-12 border-b-4 border-brand-primary mb-4"></div>
                <p className="text-gray-500 font-medium">טוען נתונים מהמערכת...</p>
            </div>
        );

        const ErrorMsg = ({msg}) => (
            <div className="flex flex-col items-center justify-center h-64 w-full text-red-500">
                <Icon name="Info" size={48} className="mb-4 opacity-50" />
                <p className="font-medium">שגיאה בטעינת הנתונים</p>
                <p className="text-sm opacity-80">{msg}</p>
            </div>
        );

        // --- Marquee Component ---
        const TestimonialsMarquee = () => {
            const feedbacks = [
                { text: "סוף סוף יש מישהו שמדבר על הדברים האלו... ומדבר על הכל פתוח! תודה רבה ושבת שלום!!!", author: "זוג מהמרכז" },
                { text: "בתחילה עשינו הוראת קבע ל-30 שח ואמרנו נראה מה שווה.. אני חייב לציין שעזרת לנו מאוד והתכנים מדויקים לנו!", author: "א. כהן" },
                { text: "תודה על הכל, למרות שאנחנו כמעט ולא מצליחים לעלות לזומים, הידיעה שיש בית מאחורינו תומכת ומחזקת מאוד!", author: "משפחת ל." },
                { text: "רציתי להודות על התוכן המדויק. אנחנו מרגישים שהתוכנית תורמת לנו המון לזוגיות. מעריכים מאוד!!", author: "ד.א." },
                { text: "לא פעם ראשונה שאני קוראת ושומעת רעיונות על זוגיות. פה זה משהו אחר הרמה, הניתוח, האבחנות.. העניין מדהים!", author: "משתתפת בתוכנית" },
                { text: "דבר ראשון חייבת להגיד שאני מתפעמת! המון המון תודה על התוכנית המופלאה הזו.", author: "ר.ב." }
            ];

            return (
                <div className="mt-16 bg-white rounded-3xl p-8 border border-brand-secondary/20 shadow-sm overflow-hidden relative">
                    <div className="text-center mb-8">
                        <h3 className="text-2xl font-extrabold text-brand-primary flex items-center justify-center gap-3">
                            <Icon name="HeartHandshake" className="text-brand-secondary" size={32} /> מה אומרים הזוגות בבית?
                        </h3>
                    </div>
                    <div className="marquee-wrapper">
                        <div className="marquee-content">
                            {feedbacks.map((item, i) => (
                                <div key={i} className="bg-brand-light p-6 rounded-2xl border-t-4 border-brand-secondary shadow-sm relative w-80 flex-shrink-0 flex flex-col">
                                    <Icon name="Quote" className="text-brand-primary/10 absolute top-4 right-4" size={32} />
                                    <p className="text-gray-700 text-sm italic relative z-10 mb-6 font-medium leading-relaxed mt-4">"{item.text}"</p>
                                    <span className="text-xs font-extrabold text-brand-primary block mt-auto">- {item.author}</span>
                                </div>
                            ))}
                        </div>
                        {/* Duplicate for infinite effect */}
                        <div className="marquee-content" aria-hidden="true">
                            {feedbacks.map((item, i) => (
                                <div key={`dup-${i}`} className="bg-brand-light p-6 rounded-2xl border-t-4 border-brand-secondary shadow-sm relative w-80 flex-shrink-0 flex flex-col">
                                    <Icon name="Quote" className="text-brand-primary/10 absolute top-4 right-4" size={32} />
                                    <p className="text-gray-700 text-sm italic relative z-10 mb-6 font-medium leading-relaxed mt-4">"{item.text}"</p>
                                    <span className="text-xs font-extrabold text-brand-primary block mt-auto">- {item.author}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // 1. Home Page
        const HomePage = ({ setPage }) => (
            <div className="animate-fade-in space-y-12">
                <div className="bg-white rounded-3xl shadow-sm border border-brand-secondary/20 overflow-hidden relative">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-brand-primary/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                    <div className="absolute bottom-0 left-0 w-48 h-48 bg-brand-secondary/10 rounded-full -ml-24 -mb-24 blur-3xl"></div>
                    
                    <div className="p-8 md:p-16 text-center relative z-10">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-brand-primary mb-6">
                            מוזמנים להיכנס אל<br/>
                            <span className="text-brand-secondary mt-2 inline-block">הבית של הזוגות הצעירים</span>
                        </h1>
                        <p className="text-xl text-gray-700 mb-8 max-w-2xl mx-auto font-medium">
                            כל הידע שזוג צריך, ללא הגבלה, רק אתם בוחרים.
                        </p>
                        <button 
                            onClick={() => setPage('explorer')}
                            className="bg-brand-primary hover:bg-brand-dark text-white px-8 py-4 rounded-full font-bold text-lg transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex items-center justify-center mx-auto gap-2"
                        >
                            <Icon name="FolderOpen" size={24} />
                            כניסה לסייר השיעורים
                        </button>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center hover:border-brand-secondary transition-colors">
                        <div className="bg-brand-secondary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-secondary">
                            <Icon name="HeartHandshake" size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-brand-primary mb-2">מרגישים יותר נורמליים</h3>
                        <p className="text-gray-600">מגוון קורסים, שידורים חיים ותכנים פרקטיים לחוויה זוגית קלאסית ורגועה.</p>
                    </div>
                    
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center hover:border-brand-secondary transition-colors">
                        <div className="bg-brand-secondary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-secondary">
                            <Icon name="ShieldCheck" size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-brand-primary mb-2">יש כתובת כשקשה</h3>
                        <p className="text-gray-600">מערך מענים דיסקרטיים בסודיות מוחלטת לשאלות אישיות ולחיזוק הקשר.</p>
                    </div>

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center hover:border-brand-secondary transition-colors">
                        <div className="bg-brand-secondary/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-secondary">
                            <Icon name="PlayCircle" size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-brand-primary mb-2">אתם לא לבד</h3>
                        <p className="text-gray-600">כל המידע שאין להשיג בשום מקום: לצפייה, להאזנה ולקריאה מהירה, הכל בסייר שלנו.</p>
                    </div>
                </div>

                <TestimonialsMarquee />
            </div>
        );

        // 2. Explorer Page
        const ExplorerPage = () => {
            const [currentPath, setCurrentPath] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [selectedFile, setSelectedFile] = React.useState(null); 
            
            const { data, loading, error } = useCSVData(CSV_URLS.DRIVE, mapDriveRow);

            const getDirectoryContents = () => {
                if (searchQuery.trim() !== "") {
                    return data
                        .filter(item => item.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                        item.path.toLowerCase().includes(searchQuery.toLowerCase()))
                        .map(item => ({ ...item, isFolder: false }));
                }

                const folders = new Set();
                const files = [];

                data.forEach(item => {
                    const itemFullPath = item.path ? `${item.path}/${item.name}` : item.name;
                    
                    if (currentPath === "" || item.path.startsWith(currentPath)) {
                        const relativePath = currentPath === "" ? item.path : item.path.replace(new RegExp(`^${currentPath}/?`), '');
                        
                        if (relativePath === "" || relativePath === item.path && currentPath !== "") {
                            files.push({ ...item, isFolder: false });
                        } else {
                            const nextFolderName = relativePath.split('/')[0];
                            if (nextFolderName) {
                                folders.add(nextFolderName);
                            }
                        }
                    }
                });

                const folderObjects = Array.from(folders).map(folderName => ({
                    id: `folder-${folderName}`,
                    name: folderName,
                    isFolder: true,
                    path: currentPath === "" ? folderName : `${currentPath}/${folderName}`
                }));

                return [...folderObjects, ...files];
            };

            const contents = getDirectoryContents();

            const handleNavigate = (newPath) => {
                setCurrentPath(newPath);
                setSearchQuery("");
            };

            const handleFileClick = (item) => {
                setSelectedFile(item);
            };

            const breadcrumbs = currentPath.split('/').filter(p => p !== '');

            const getFileIcon = (type, inModal = false) => {
                const colorClass = inModal ? 'text-white' : 
                    type === 'video' ? 'text-blue-500' :
                    type === 'audio' ? 'text-brand-secondary' :
                    type === 'pdf' ? 'text-red-500' : 'text-gray-500';

                switch(type) {
                    case 'video': return <Icon name="FileVideo" className={colorClass} size={32} />;
                    case 'audio': return <Icon name="FileAudio" className={colorClass} size={32} />;
                    case 'pdf': return <Icon name="FileText" className={colorClass} size={32} />;
                    default: return <Icon name="FileText" className={colorClass} size={32} />;
                }
            };

            const getEmbedUrl = (url) => {
                const driveIdMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                if (driveIdMatch && driveIdMatch[1]) {
                    return `https://drive.google.com/file/d/${driveIdMatch[1]}/preview`;
                }
                return url; 
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden min-h-[600px] flex flex-col relative">
                    
                    {/* Modal for Video/PDF */}
                    {selectedFile && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 md:p-8 animate-fade-in">
                            <div className="bg-white w-full max-w-5xl h-full md:h-[90vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl border border-brand-primary/20">
                                <div className="bg-brand-primary text-white p-4 flex justify-between items-center shadow-md z-10">
                                    <div className="flex items-center gap-3">
                                        {getFileIcon(selectedFile.type, true)}
                                        <h3 className="font-bold text-lg leading-tight" dir="rtl">{selectedFile.name}</h3>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <a 
                                            href={selectedFile.url} 
                                            target="_blank" 
                                            rel="noopener noreferrer" 
                                            className="bg-brand-secondary hover:bg-yellow-600 text-white px-4 py-2 rounded-full text-sm font-bold transition-colors flex items-center gap-2"
                                        >
                                            <Icon name="ExternalLink" size={16} />
                                            פתיחה בדרייב
                                        </a>
                                        <button 
                                            onClick={() => setSelectedFile(null)} 
                                            className="p-2 hover:bg-white/20 rounded-full transition-colors"
                                            title="סגירה"
                                        >
                                            <Icon name="X" size={24} />
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 bg-gray-100 relative w-full h-full">
                                    <iframe 
                                        src={getEmbedUrl(selectedFile.url)} 
                                        className="w-full h-full border-none absolute inset-0" 
                                        allow="autoplay"
                                        title={selectedFile.name}
                                    ></iframe>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-gray-50 p-4 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-2 text-gray-600 font-medium overflow-x-auto w-full sm:w-auto whitespace-nowrap">
                            <button onClick={() => handleNavigate("")} className="hover:text-brand-primary p-1">
                                <Icon name="Home" size={20} />
                            </button>
                            {breadcrumbs.map((crumb, index) => {
                                const pathToHere = breadcrumbs.slice(0, index + 1).join('/');
                                return (
                                    <React.Fragment key={index}>
                                        <Icon name="ChevronLeft" size={16} className="text-gray-400" />
                                        <button 
                                            onClick={() => handleNavigate(pathToHere)}
                                            className="hover:text-brand-primary transition-colors"
                                        >
                                            {crumb}
                                        </button>
                                    </React.Fragment>
                                );
                            })}
                        </div>

                        <div className="relative w-full sm:w-64">
                            <input 
                                type="text" 
                                placeholder="חיפוש שיעורים..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full pl-4 pr-10 py-2 rounded-full border border-gray-300 focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary text-sm"
                            />
                            <div className="absolute top-2.5 right-3 text-gray-400">
                                <Icon name="Search" size={18} />
                            </div>
                        </div>
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto">
                        {loading ? <Loader /> : error ? <ErrorMsg msg={error} /> : contents.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-gray-400 py-12">
                                <Icon name="FolderOpen" size={64} className="mb-4 opacity-50" />
                                <p className="text-lg">לא נמצאו תכנים בתיקיה זו.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {contents.map(item => (
                                    item.isFolder ? (
                                        <div 
                                            key={item.id} 
                                            onClick={() => handleNavigate(item.path)}
                                            className="group flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl border border-gray-100 hover:border-brand-secondary hover:bg-brand-secondary/5 cursor-pointer transition-all"
                                        >
                                            <Icon name="Folder" className="text-brand-secondary mb-3 group-hover:scale-110 transition-transform" size={48} />
                                            <span className="text-gray-800 font-medium text-center">{item.name}</span>
                                        </div>
                                    ) : (
                                        <div 
                                            key={item.id}
                                            onClick={() => handleFileClick(item)}
                                            className="group flex flex-col items-start p-4 bg-white rounded-xl border border-gray-200 hover:border-brand-primary hover:shadow-md transition-all cursor-pointer relative"
                                        >
                                            <div className="flex w-full items-start justify-between mb-3">
                                                {getFileIcon(item.type)}
                                                <Icon name={item.type === 'audio' ? "Headphones" : "Maximize"} size={16} className="text-gray-300 group-hover:text-brand-primary transition-colors" />
                                            </div>
                                            <span className="text-gray-800 font-medium text-sm leading-tight mb-2 flex-1" dir="rtl">{item.name}</span>
                                            {item.date && (
                                                <span className="text-xs text-gray-400 mt-auto">{item.date}</span>
                                            )}
                                        </div>
                                    )
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 3. Schedule Page
        const SchedulePage = () => {
            const { data, loading, error } = useCSVData(CSV_URLS.SCHEDULE, mapScheduleRow);

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-brand-primary mb-3">לוח זמני שיעורים</h2>
                        <p className="text-gray-600">התעדכנו בשידורים החיים והסדנאות הקרובות שלנו.</p>
                    </div>

                    <div className="grid gap-4 max-w-4xl mx-auto">
                        {loading ? <Loader /> : error ? <ErrorMsg msg={error} /> : data.map(item => (
                            <div key={item.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row items-start md:items-center gap-6 hover:border-brand-secondary transition-colors">
                                <div className="bg-brand-primary/10 text-brand-primary rounded-xl p-4 flex flex-col items-center justify-center min-w-[100px] shrink-0">
                                    <Icon name="Calendar" size={24} className="mb-1" />
                                    <span className="font-bold">{item.date}</span>
                                </div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 text-brand-secondary font-medium mb-1">
                                        <Icon name="Clock" size={16} />
                                        <span>בשעה {item.time}</span>
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-2">{item.title}</h3>
                                    <p className="text-gray-600">{item.description}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 4. Articles Page
        const ArticlesPage = () => {
            const { data, loading, error } = useCSVData(CSV_URLS.ARTICLES, mapArticleRow);

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-brand-primary mb-3">מאמרים וקריאה מהירה</h2>
                        <p className="text-gray-600">ידע מקצועי וערכי להעמקת הקשר הזוגי, נגיש ונוח לקריאה.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {loading ? <Loader /> : error ? <ErrorMsg msg={error} /> : data.map(article => (
                            <div key={article.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow flex flex-col">
                                <div className="h-2 bg-brand-secondary w-full"></div>
                                <div className="p-6 flex-1 flex flex-col">
                                    <span className="text-xs text-gray-400 mb-2 block">{article.date}</span>
                                    <h3 className="text-xl font-bold text-brand-primary mb-3">{article.title}</h3>
                                    <p className="text-gray-600 mb-6 flex-1 text-sm leading-relaxed">{article.summary}</p>
                                    <a href={article.url} target="_blank" rel="noopener noreferrer" className="text-brand-secondary font-bold flex items-center gap-1 hover:text-brand-primary transition-colors mt-auto w-max">
                                        קראו עוד
                                        <Icon name="ChevronLeft" size={16} />
                                    </a>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 5. About Page
        const AboutPage = () => (
            <div className="max-w-3xl mx-auto space-y-8 animate-fade-in bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100">
                <div className="text-center mb-8">
                    <h2 className="text-3xl font-bold text-brand-primary mb-2">אודות הבית</h2>
                    <div className="w-16 h-1 bg-brand-secondary mx-auto rounded-full"></div>
                </div>

                <div className="prose prose-lg prose-brand rtl text-gray-700 space-y-6">
                    <p className="font-medium text-lg leading-relaxed">
                        ברוכים הבאים אל <strong>הבית של הזוגות הצעירים</strong>. בנינו את המקום הזה מתוך הבנה עמוקה של האתגרים וההתמודדויות שזוגות חווים בתחילת דרכם.
                        המטרה שלנו היא להעניק לכם את כל הידע שזוג צריך, ללא הגבלה, תוך שמירה על הערכים החשובים לנו.
                    </p>

                    <div className="bg-brand-primary/5 p-6 rounded-2xl border border-brand-primary/10">
                        <h3 className="text-brand-primary font-bold text-xl mb-3 flex items-center gap-2">
                            <Icon name="ShieldCheck" size={24} />
                            סודיות מוחלטת
                        </h3>
                        <p className="text-sm leading-relaxed">
                            שמות בני הבית, כתובות המייל, המידע האישי, התכתובות בינינו והשאלות שאתם כותבים - גלויים לעיניי בלבד. המידע נשמר תחת תקני אבטחה מחמירים ואינו נגיש לאיש מלבדי. 
                            הדיסקרטיות היא הערך העליון של ניהול הבית. מעולם איננו חושפים פרטים מזהים, וכל התייחסות לשאלות נעשית לאחר טשטוש מוחלט של פרטים.
                        </p>
                    </div>

                    <p>
                        <strong>אין התחייבות:</strong> ניתן לצאת מהבית בקלות בכל עת, ללא צורך בהסבר. אנו מאמינים שאמון ורצון חופשי הם הבסיס ללמידה אמיתית.
                    </p>

                    <p>
                        הפרויקט מלווה בברכתו והסכמתו של מו"ר הרב מרדכי אויערבאך שליט"א, מתוך כוונה להרבות נחת ושלום בבתי ישראל.
                    </p>

                    <div className="pt-8 mt-8 border-t border-gray-100 text-center">
                        <p className="text-gray-500 mb-2">שלכם ובשבילכם,</p>
                        <h4 className="text-2xl font-bold text-brand-primary font-serif">אביאל נריה</h4>
                    </div>
                </div>
            </div>
        );

        // ----------------------------------------------------
        // Main App Container
        // ----------------------------------------------------
        const App = () => {
            const [currentPage, setCurrentPage] = React.useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [showBackToTop, setShowBackToTop] = React.useState(false);

            // A11y State
            const [showA11y, setShowA11y] = React.useState(false);

            // Handle URL Routing
            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'home';
                    const validPages = ['home', 'explorer', 'schedule', 'articles', 'about'];
                    if (validPages.includes(hash)) {
                        setCurrentPage(hash);
                    }
                };
                
                handleHashChange(); // Init on load
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const navigate = (pageId) => {
                window.location.hash = pageId;
                setIsMobileMenuOpen(false);
            };

            // Scroll Listener for Back to Top
            React.useEffect(() => {
                const handleScroll = () => setShowBackToTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // A11y Methods
            const toggleA11yMenu = () => setShowA11y(!showA11y);
            const changeFontSize = (step) => {
                const currentSize = parseFloat(getComputedStyle(document.body).fontSize);
                document.body.style.fontSize = `${currentSize + step}px`;
            };
            const toggleReadableFont = () => document.body.classList.toggle('a11y-readable-font');
            const toggleHighlightLinks = () => document.body.classList.toggle('a11y-highlight-links');
            const resetA11y = () => {
                document.body.style.fontSize = '';
                document.body.classList.remove('a11y-readable-font', 'a11y-highlight-links');
                setShowA11y(false);
            };

            const navItems = [
                { id: 'home', label: 'ראשי', icon: 'Home' },
                { id: 'explorer', label: 'סייר שיעורים', icon: 'FolderOpen' },
                { id: 'schedule', label: 'לוח זמנים', icon: 'Calendar' },
                { id: 'articles', label: 'מאמרים', icon: 'BookOpen' },
                { id: 'about', label: 'אודות', icon: 'Info' },
            ];

            const renderPage = () => {
                switch(currentPage) {
                    case 'home': return <HomePage setPage={navigate} />;
                    case 'explorer': return <ExplorerPage />;
                    case 'schedule': return <SchedulePage />;
                    case 'articles': return <ArticlesPage />;
                    case 'about': return <AboutPage />;
                    default: return <HomePage setPage={navigate} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative pb-20 sm:pb-0">
                    
                    {/* Header / Navbar */}
                    <header className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('home')}>
                                    <div className="flex items-center font-black text-4xl tracking-tighter">
                                        <span className="text-brand-secondary">ה</span>
                                        <span className="text-brand-primary">בי</span>
                                        <span className="text-brand-primary">ת</span>
                                        <div className="flex flex-col gap-1 mr-1 pt-1">
                                            {[1,2,3,4,5].map(i => (
                                                <span key={i} className="w-1.5 h-1.5 rounded-full bg-brand-secondary"></span>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center gap-4">
                                    <nav className="hidden md:flex gap-1">
                                        {navItems.map(item => (
                                            <button
                                                key={item.id}
                                                onClick={() => navigate(item.id)}
                                                className={`px-4 py-2 rounded-full flex items-center gap-2 font-medium transition-all
                                                    ${currentPage === item.id 
                                                        ? 'bg-brand-primary/10 text-brand-primary' 
                                                        : 'text-gray-600 hover:bg-gray-50 hover:text-brand-primary'
                                                    }`}
                                            >
                                                <Icon name={item.icon} size={18} />
                                                {item.label}
                                            </button>
                                        ))}
                                    </nav>

                                    {/* A11y Button */}
                                    <button onClick={toggleA11yMenu} className="p-2 text-gray-500 hover:text-brand-primary hover:bg-gray-100 rounded-full transition" title="הגדרות נגישות">
                                        <Icon name="Accessibility" size={20} />
                                    </button>

                                    <div className="md:hidden">
                                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-brand-primary p-2">
                                            <Icon name={isMobileMenuOpen ? "X" : "Menu"} size={28} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        {isMobileMenuOpen && (
                            <div className="md:hidden border-t border-gray-100 bg-white absolute w-full shadow-lg">
                                <div className="px-4 pt-2 pb-4 space-y-1">
                                    {navItems.map(item => (
                                        <button
                                            key={item.id}
                                            onClick={() => navigate(item.id)}
                                            className={`w-full text-right px-4 py-3 rounded-xl flex items-center gap-3 font-medium transition-all
                                                ${currentPage === item.id 
                                                    ? 'bg-brand-primary/10 text-brand-primary' 
                                                    : 'text-gray-600 hover:bg-gray-50'
                                                }`}
                                        >
                                            <Icon name={item.icon} size={20} />
                                            {item.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </header>

                    {/* A11y Floating Menu */}
                    {showA11y && (
                        <div className="fixed top-24 left-4 sm:left-8 z-[100] flex flex-col items-start animate-fade-in">
                            <div className="bg-white p-5 rounded-2xl shadow-2xl border-2 border-brand-secondary mb-3 w-64 text-right">
                                <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-3">
                                    <button onClick={toggleA11yMenu} className="text-gray-400 hover:text-red-500 transition">
                                        <Icon name="X" size={20} />
                                    </button>
                                    <h3 className="font-bold text-brand-primary flex items-center gap-2">
                                        נגישות <Icon name="Accessibility" size={20} className="text-brand-secondary" />
                                    </h3>
                                </div>
                                <div className="space-y-2.5">
                                    <button onClick={() => changeFontSize(2)} className="w-full bg-gray-50 hover:bg-gray-200 text-gray-800 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        הגדל טקסט <Icon name="ZoomIn" size={16} />
                                    </button>
                                    <button onClick={() => changeFontSize(-2)} className="w-full bg-gray-50 hover:bg-gray-200 text-gray-800 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        הקטן טקסט <Icon name="ZoomOut" size={16} />
                                    </button>
                                    <button onClick={toggleHighlightLinks} className="w-full bg-gray-50 hover:bg-gray-200 text-gray-800 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        הדגשת קישורים <Icon name="Underline" size={16} />
                                    </button>
                                    <button onClick={toggleReadableFont} className="w-full bg-gray-50 hover:bg-gray-200 text-gray-800 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        גופן קריא <Icon name="Type" size={16} />
                                    </button>
                                    <div className="w-full h-px bg-gray-200 my-2"></div>
                                    <button onClick={resetA11y} className="w-full bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl text-sm font-bold transition flex justify-between items-center">
                                        איפוס הגדרות <Icon name="RefreshCw" size={16} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 md:py-12 relative">
                        {renderPage()}
                    </main>

                    {/* Back to Top Button */}
                    <button 
                        onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} 
                        className={`fixed bottom-24 sm:bottom-8 left-6 bg-brand-primary text-white p-3 rounded-full shadow-xl transition-all duration-300 z-40 hover:scale-110 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                    >
                        <Icon name="ArrowUp" size={24} />
                    </button>

                    {/* Footer */}
                    <footer className="bg-brand-dark text-white py-8 border-t-4 border-brand-secondary">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p className="text-brand-light/80 mb-2">© {new Date().getFullYear()} הבית של הזוגות הצעירים - אביאל נריה. כל הזכויות שמורות.</p>
                            <p className="text-sm text-brand-light/50">מערכת תכנים פרטית</p>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
